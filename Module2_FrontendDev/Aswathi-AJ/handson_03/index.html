<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 class="site-title">Student Portal</h1>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="hero">
            <h2>Welcome to the Student Portal</h2>

            <p>
                Access your courses, profile, grades, and learning resources in one place.
            </p>

            <button>Explore Courses</button>
        </section>

        <section id="stats">

            <div class="stat-item">
                <h3>Courses Enrolled</h3>
                <p>5</p>
            </div>

            <div class="stat-item">
                <h3>GPA</h3>
                <p>3.8</p>
            </div>

            <div class="stat-item">
                <h3>Semester</h3>
                <p>6</p>
            </div>

        </section>

        <section id="courses">

            <h2>Available Courses</h2>

            <div class="controls">

    <input
        type="text"
        id="search-courses"
        placeholder="Search courses..."
    >

    <button id="sort-btn">
        Sort by Credits
    </button>

</div>

            <div class="course-grid"></div>
            <p id="total-credits"></p>
            <div id="selected-course"></div>

        </section>

    </main>
    <footer>
        <p>&copy; 2026 Student Portal. All rights reserved.</p>
    </footer>

    <script type="module" src="app.js"></script>

</body>
</html>
